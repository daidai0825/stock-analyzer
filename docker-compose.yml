services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/stock_analyzer
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend

  worker:
    build: ./backend
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/stock_analyzer
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  beat:
    build: ./backend
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  pgdata:
